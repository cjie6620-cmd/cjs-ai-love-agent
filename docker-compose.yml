x-memory-task-environment: &memory-task-environment
  APP_ENV: ${APP_ENV:-prod}
  DEBUG: ${DEBUG:-false}
  MYSQL_URL: ${MYSQL_URL_DOCKER:?MYSQL_URL_DOCKER is required}
  REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
  VECTOR_DB_URL: postgresql+psycopg://ai_love:${PGVECTOR_PASSWORD:-change-me}@postgres:5432/ai_love_vector
  ROCKETMQ_NAMESRV_ADDR: rocketmq-namesrv:9876
  ROCKETMQ_PRODUCER_GROUP: ${ROCKETMQ_PRODUCER_GROUP:-ai_love_memory_producer}
  ROCKETMQ_MEMORY_TOPIC: ${ROCKETMQ_MEMORY_TOPIC:-ai_love_memory_extraction}
  ROCKETMQ_MEMORY_TAG: ${ROCKETMQ_MEMORY_TAG:-memory.extract.v1}
  ROCKETMQ_MEMORY_CONSUMER_GROUP: ${ROCKETMQ_MEMORY_CONSUMER_GROUP:-ai_love_memory_consumer}
  ROCKETMQ_SEND_TIMEOUT_MS: ${ROCKETMQ_SEND_TIMEOUT_MS:-3000}
  ROCKETMQ_MAX_RECONSUME_TIMES: ${ROCKETMQ_MAX_RECONSUME_TIMES:-16}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
  DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
  LLM_PROVIDER: ${LLM_PROVIDER:-xai_router}
  LLM_BASE_URL: ${LLM_BASE_URL:-https://api.xairouter.com/v1}
  LLM_MODEL: ${LLM_MODEL:-gpt-5.4}
  XAI_API_KEY: ${XAI_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  TOKENIZER_BACKEND: ${TOKENIZER_BACKEND:-auto}
  HF_TOKENIZER_REPO: ${HF_TOKENIZER_REPO:-}
  VECTOR_DIMENSION: ${VECTOR_DIMENSION:-1536}
  LANGSMITH_ENABLED: ${LANGSMITH_ENABLED:-false}
  LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
  LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
  LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
  LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
  LANGSMITH_PRIVACY_MODE: ${LANGSMITH_PRIVACY_MODE:-true}
  ES_HOSTS: http://elasticsearch:9200
  ES_INDEX: ${ES_INDEX:-knowledge_chunks}
  ES_USERNAME: ${ES_USERNAME:-elastic}
  ES_PASSWORD: ${ES_PASSWORD:-change-me}
  ES_TIMEOUT_MS: ${ES_TIMEOUT_MS:-5000}
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me}
  MINIO_BUCKET: ${MINIO_BUCKET:-ai-love}
  RERANK_SERVICE_URL: http://reranker-api:8001
  RERANK_API_KEY: ${RERANK_API_KEY:-}
  RERANK_TIMEOUT_MS: ${RERANK_TIMEOUT_MS:-5000}
  RESPONSE_CACHE_ENABLED: ${RESPONSE_CACHE_ENABLED:-true}
  RESPONSE_CACHE_EXACT_TTL_SECONDS: ${RESPONSE_CACHE_EXACT_TTL_SECONDS:-600}
  RESPONSE_CACHE_SEMANTIC_TTL_SECONDS: ${RESPONSE_CACHE_SEMANTIC_TTL_SECONDS:-1800}
  RESPONSE_CACHE_SEMANTIC_THRESHOLD: ${RESPONSE_CACHE_SEMANTIC_THRESHOLD:-0.94}
  RESPONSE_CACHE_VERSION: ${RESPONSE_CACHE_VERSION:-chat_response_cache.v1}
  MCP_AMAP_ENABLED: ${MCP_AMAP_ENABLED:-false}
  MCP_TRANSPORT: ${MCP_TRANSPORT:-streamable_http}
  AMAP_MAPS_API_KEY: ${AMAP_MAPS_API_KEY:-}
  AMAP_MCP_URL: http://mcp-amap:3100/mcp
  AMAP_MCP_HEADERS_JSON: ${AMAP_MCP_HEADERS_JSON:-}

x-memory-task-common: &memory-task-common
  build:
    context: .
    dockerfile: docker/memory-tasks/Dockerfile
  env_file:
    - .env
  environment: *memory-task-environment
  restart: unless-stopped
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    rocketmq-init:
      condition: service_completed_successfully

services:
  mysql:
    image: mysql:8.4
    container_name: ai-love-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_love}
      MYSQL_USER: ${MYSQL_USER:-ai_love}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/mysql_init.sql:/docker-entrypoint-initdb.d/20-mysql_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    container_name: ai-love-redis
    restart: unless-stopped
    command: sh -c "redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}"
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  memory-consumer:
    <<: *memory-task-common
    container_name: ai-love-memory-consumer
    command: python -m agents.memory_consumer

  memory-outbox-relay:
    <<: *memory-task-common
    container_name: ai-love-memory-outbox-relay
    command: sh -c "while true; do python -m agents.memory_outbox_relay; sleep ${MEMORY_OUTBOX_RELAY_INTERVAL_SECONDS:-30}; done"

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile
    image: ${ELASTICSEARCH_IMAGE:-ai-love-elasticsearch:latest}
    container_name: ai-love-es
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.enrollment.enabled: "true"
      ELASTIC_PASSWORD: ${ES_PASSWORD:-change-me}
      ES_JAVA_OPTS: -Xms2g -Xmx2g
      bootstrap.memory_lock: "true"
      network.host: 0.0.0.0
      http.cors.enabled: "true"
      http.cors.allow-origin: "http://127.0.0.1:8888,http://localhost:8888"
      http.cors.allow-headers: "Authorization, Content-Type, X-Requested-With"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:${ES_PASSWORD:-change-me} http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G
    ulimits:
      memlock:
        soft: -1
        hard: -1

  kibana-setup:
    image: curlimages/curl:8.6.0
    container_name: ai-love-kibana-setup
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: "no"
    environment:
      ES_PASSWORD: ${ES_PASSWORD:-change-me}
      KIBANA_SYSTEM_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-change-me}
    command:
      - sh
      - -c
      - >
        curl -fsS -u elastic:$${ES_PASSWORD}
        -H 'Content-Type: application/json'
        -X POST http://elasticsearch:9200/_security/user/kibana_system/_password
        -d "{\"password\":\"$${KIBANA_SYSTEM_PASSWORD}\"}"

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: ai-love-kibana
    restart: unless-stopped
    depends_on:
      kibana-setup:
        condition: service_completed_successfully
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_SYSTEM_PASSWORD:-change-me}
      SERVER_HOST: 0.0.0.0
      XPACK_SECURITY_ENCRYPTIONKEY: ${KIBANA_SECURITY_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: ${KIBANA_SAVED_OBJECTS_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      XPACK_REPORTING_ENCRYPTIONKEY: ${KIBANA_REPORTING_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 60s

  elasticvue:
    image: cars10/elasticvue:latest
    container_name: ai-love-elasticvue
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "8888:8080"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-love-pgvector
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_love_vector
      POSTGRES_USER: ai_love
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-change-me}
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./sql/pgvector_schema.sql:/docker-entrypoint-initdb.d/20-pgvector_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_love -d ai_love_vector"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: ai-love-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-change-me}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  reranker-api:
    build:
      context: .
      dockerfile: docker/reranker-api/Dockerfile
    container_name: ai-love-reranker
    restart: unless-stopped
    environment:
      RERANK_MODEL_NAME: BAAI/bge-reranker-v2-m3
      RERANK_DEVICE: cpu
      RERANK_BATCH_SIZE: "8"
      HF_ENDPOINT: ""
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: ai-love-rocketmq-namesrv
    restart: unless-stopped
    command: nameserver
    ports:
      - "9876:9876"
    volumes:
      - rocketmq_namesrv_logs:/home/rocketmq/logs

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: ai-love-rocketmq-broker
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    command: broker -n rocketmq-namesrv:9876 -c /home/rocketmq/conf/broker.conf
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/conf/broker.conf:ro
      - rocketmq_broker_logs:/home/rocketmq/logs
      - rocketmq_broker_store:/home/rocketmq/store

  rocketmq-init:
    image: apache/rocketmq:5.3.1
    container_name: ai-love-rocketmq-init
    restart: "no"
    depends_on:
      - rocketmq-namesrv
      - rocketmq-broker
    command:
      - sh
      - -c
      - >
        for i in $$(seq 1 20); do
          /home/rocketmq/rocketmq-5.3.1/bin/mqadmin updateTopic -n rocketmq-namesrv:9876 -c ai-love-rocketmq-cluster -t ${ROCKETMQ_MEMORY_TOPIC:-ai_love_memory_extraction} && exit 0;
          sleep 3;
        done;
        exit 1

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: ai-love-rocketmq-dashboard
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: -Drocketmq.namesrv.addr=rocketmq-namesrv:9876
    ports:
      - "8088:8082"

  mcp-amap:
    profiles: ["amap"]
    build:
      context: .
      dockerfile: docker/mcp-amap/Dockerfile
    container_name: ai-love-mcp-amap
    restart: unless-stopped
    environment:
      AMAP_MAPS_API_KEY: ${AMAP_MAPS_API_KEY:?AMAP_MAPS_API_KEY is required when using the amap profile}
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "3100"
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  mysql_data:
  redis_data:
  es_data:
  pgvector_data:
  minio_data:
  rocketmq_namesrv_logs:
  rocketmq_broker_logs:
  rocketmq_broker_store:
