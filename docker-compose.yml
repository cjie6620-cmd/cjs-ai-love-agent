version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: ai-love-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_love
      MYSQL_USER: ai_love
      MYSQL_PASSWORD: ai_love
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2
    container_name: ai-love-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-love-pgvector
    environment:
      POSTGRES_DB: ai_love_vector
      POSTGRES_USER: ai_love
      POSTGRES_PASSWORD: ai_love
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ai-love-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  mysql_data:
  redis_data:
  pgvector_data:
  minio_data:
